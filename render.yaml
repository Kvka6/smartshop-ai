services:
  - type: web
    name: smartshop-ai-api
    runtime: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERPAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COUNTRY
        value: IN
